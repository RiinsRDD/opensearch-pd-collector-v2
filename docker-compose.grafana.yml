services:
  grafana:
    image: grafana/grafana:latest
    container_name: pdn_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pdn_network

volumes:
  grafana_data:


networks:
  pdn_network:
    external: true
