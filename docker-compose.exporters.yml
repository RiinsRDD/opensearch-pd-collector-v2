services:
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: pdn_postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-pdn_user}:${POSTGRES_PASSWORD:-pdn_password}@db:5432/${POSTGRES_DB:-pdn_collector}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - pdn_network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: pdn_node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - pdn_network

networks:
  pdn_network:
    external: true
