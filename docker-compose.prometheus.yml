services:
  prometheus:
    image: prom/prometheus:latest
    container_name: pdn_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pdn_network

volumes:
  prometheus_data:


networks:
  pdn_network:
    external: true
